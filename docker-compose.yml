services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: knotwise
      POSTGRES_PASSWORD: knotwise
      POSTGRES_DB: knotwise
    ports:
      - "5433:5432"
    volumes:
      - knotwise_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - knotwise_redis:/data

volumes:
  knotwise_pg:
  knotwise_redis:
